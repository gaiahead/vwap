<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VWAP 추세 모니터</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <link rel="stylesheet" href="style.css?v=light-20260503"/>
</head>
<body>

<header>
  <h1>📊 VWAP 추세 모니터</h1>
  <p>Volume Weighted Average Price · <span id="updated"></span></p>
</header>

<div class="groups" id="groups"></div>

<div class="detail-section" id="detail-section" style="display:none">
  <div class="detail-header">
    <h2 id="detail-title">Loading...</h2>
    <button class="close-btn" id="detail-close">✕</button>
  </div>
  <div id="detail-content">
    <!-- Panel A -->
    <div class="panel-box">
      <div class="panel-title">VWAP Lines</div>
      <div style="position:relative;height:440px"><canvas id="chart-price"></canvas></div>
    </div>
    <!-- Panel B -->
    <div class="panel-box" style="margin-top:16px">
      <div class="panel-title">Volume Profile</div>
      <div class="vp-tabs" id="vp-tabs">
        <button class="vp-tab active" data-period="10d">10d</button>
        <button class="vp-tab" data-period="20d">20d</button>
        <button class="vp-tab" data-period="30d">30d</button>
        <button class="vp-tab" data-period="40d">40d</button>
        <button class="vp-tab" data-period="50d">50d</button>
        <button class="vp-tab" data-period="60d">60d</button>
        <button class="vp-tab" data-period="70d">70d</button>
        <button class="vp-tab" data-period="80d">80d</button>
        <button class="vp-tab" data-period="90d">90d</button>
        <button class="vp-tab" data-period="100d">100d</button>
        <button class="vp-tab" data-period="110d">110d</button>
        <button class="vp-tab" data-period="120d">120d</button>
        <button class="vp-tab" data-period="130d">130d</button>
        <button class="vp-tab" data-period="140d">140d</button>
        <button class="vp-tab" data-period="150d">150d</button>
        <button class="vp-tab" data-period="160d">160d</button>
        <button class="vp-tab" data-period="170d">170d</button>
        <button class="vp-tab" data-period="180d">180d</button>
        <button class="vp-tab" data-period="190d">190d</button>
        <button class="vp-tab" data-period="200d">200d</button>
      </div>
      <div style="position:relative;height:440px"><canvas id="chart-vp"></canvas></div>
    </div>
    <!-- Panel C -->
    <div class="panel-box" style="margin-top:16px">
      <div class="panel-title">VMS Matrix</div>
      <div id="vms-matrix"></div>
    </div>
  </div>
</div>

<div class="section-box" id="vms-section" style="display:none">
  <div class="panel-title">📐 VMS List</div>
  <div class="vms-table-wrap"><table class="vms-table">
    <thead>
      <tr>
        <th>종목</th>
        <th>VMS</th>
        <th>10d</th><th>20d</th><th>30d</th><th>40d</th><th>50d</th>
        <th>60d</th><th>70d</th><th>80d</th><th>90d</th><th>100d</th>
      </tr>
    </thead>
    <tbody id="vms-body"></tbody>
  </table></div>
</div>

<div class="section-box">
  <div class="panel-title">VMS 설명</div>
  <div style="font-size:0.75rem;color:#64748b;margin-bottom:10px">
    VMS = Σ(가중치 × 행 점수) / Σ(가중치) &nbsp;|&nbsp; 지수 감소 0.75
  </div>
  <div style="font-size:0.73rem;color:#64748b;margin-bottom:12px">
    10d당 복리 성장률 = (endpoint_vwap / start_vwap)^(1/j) - 1 &nbsp;|&nbsp;
    행 점수 = 셀 점수의 평균
  </div>
  <table style="border-collapse:collapse;font-size:0.72rem;width:100%;max-width:700px">
    <thead>
      <tr>
        <th style="padding:4px 12px;text-align:left;color:#475569;border-bottom:1px solid #e2e8f0">Endpoint</th>
        <th style="padding:4px 12px;text-align:right;color:#475569;border-bottom:1px solid #e2e8f0">가중치</th>
        <th style="padding:4px 12px;text-align:right;color:#475569;border-bottom:1px solid #e2e8f0">비중</th>
        <th style="padding:4px 12px;text-align:left;color:#475569;border-bottom:1px solid #e2e8f0;padding-left:16px">시작점 범위</th>
      </tr>
    </thead>
    <tbody id="vms-weight-table"></tbody>
  </table>
</div>

<script src="app.js?v=light-20260503"></script>
</body>
</html>
