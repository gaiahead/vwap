<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLD 2주 VWAP 추세추종 백테스트</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { padding: 28px 32px 20px; border-bottom: 1px solid #1e2535; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
    header p  { font-size: 0.82rem; color: #64748b; margin-top: 4px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; padding: 24px 32px; }
    .card { background: #161b27; border: 1px solid #1e2535; border-radius: 12px; padding: 16px 20px; }
    .card .label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .card .value { font-size: 1.5rem; font-weight: 700; }
    .card .value.up   { color: #34d399; }
    .card .value.down { color: #f87171; }
    .card .value.neu  { color: #94a3b8; }
    .section { padding: 0 32px 32px; }
    .section h2 { font-size: 0.78rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
    .chart-wrap { background: #161b27; border: 1px solid #1e2535; border-radius: 14px; padding: 20px; margin-bottom: 24px; position: relative; }
    .chart-wrap canvas { max-height: 320px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead tr { background: #1a2030; }
    th { padding: 8px 12px; text-align: left; color: #64748b; font-weight: 500; }
    tbody tr { border-top: 1px solid #1e2535; }
    tbody tr:hover { background: #1a2030; }
    td { padding: 8px 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .badge.UP   { background: #064e3b; color: #34d399; }
    .badge.DOWN { background: #450a0a; color: #f87171; }
    .badge.BUY  { background: #064e3b; color: #34d399; }
    .badge.SELL { background: #450a0a; color: #f87171; }
    footer { padding: 20px 32px; border-top: 1px solid #1e2535; font-size: 0.72rem; color: #374151; }
  </style>
</head>
<body>
<header>
  <h1>GLD · 2주 롤링 Volume Profile VWAP 추세추종</h1>
  <p id="meta-desc">데이터 로딩 중...</p>
</header>

<div class="cards" id="cards"></div>

<div class="section">
  <h2>포트폴리오 가치</h2>
  <div class="chart-wrap"><canvas id="chart-portfolio"></canvas></div>
</div>

<div class="section">
  <h2>GLD 가격 + 2주 VWAP</h2>
  <div class="chart-wrap"><canvas id="chart-price"></canvas></div>
</div>

<div class="section">
  <h2>금 비중 변화</h2>
  <div class="chart-wrap" style="max-height:180px"><canvas id="chart-alloc"></canvas></div>
</div>

<div class="section">
  <h2>리밸런싱 기록 (총 <span id="trade-count">-</span>회)</h2>
  <div class="chart-wrap" style="padding:0; overflow:hidden;">
    <table>
      <thead><tr>
        <th>날짜</th><th>추세</th><th>VWAP (현재)</th><th>VWAP (1주 전)</th><th>액션</th><th>비중</th>
      </tr></thead>
      <tbody id="trade-tbody"></tbody>
    </table>
  </div>
</div>

<footer>
  데이터: Yahoo Finance / GLD (SPDR Gold Shares) · 백테스트는 과거 성과이며 미래를 보장하지 않습니다.
</footer>

<script>
const thin = (arr, step) => arr.filter((_, i) => i % step === 0 || i === arr.length - 1);

fetch('data.json').then(r => r.json()).then(data => {
  const { meta, summary, daily, trades } = data;

  // meta
  document.getElementById('meta-desc').textContent =
    `${meta.ticker} · ${meta.start} ~ ${meta.end} · 초기자금 ${(meta.initial_capital/1e6).toFixed(0)}백만원 · 2주 VWAP (${meta.buckets}버킷) · 주당 ${meta.shift_pct}% 리밸런싱`;

  // cards
  const sRet = summary.strategy_return;
  const bRet = summary.buyhold_return;
  const diff = (sRet - bRet).toFixed(2);
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="label">전략 수익률</div><div class="value ${sRet>=0?'up':'down'}">${sRet>=0?'+':''}${sRet}%</div></div>
    <div class="card"><div class="label">Buy &amp; Hold</div><div class="value ${bRet>=0?'up':'down'}">${bRet>=0?'+':''}${bRet}%</div></div>
    <div class="card"><div class="label">초과 수익</div><div class="value ${diff>=0?'up':'down'}">${diff>=0?'+':''}${diff}%p</div></div>
    <div class="card"><div class="label">전략 최종금액</div><div class="value neu">${(summary.strategy_final/1e4).toFixed(0)}만원</div></div>
    <div class="card"><div class="label">B&amp;H 최종금액</div><div class="value neu">${(summary.buyhold_final/1e4).toFixed(0)}만원</div></div>
    <div class="card"><div class="label">총 리밸런싱</div><div class="value neu">${summary.total_trades}회</div></div>
    <div class="card"><div class="label">현재 금 비중</div><div class="value neu">${summary.final_allocation}%</div></div>
  `;

  // trade table
  document.getElementById('trade-count').textContent = trades.length;
  document.getElementById('trade-tbody').innerHTML = [...trades].reverse().map(t => `
    <tr>
      <td>${t.date}</td>
      <td><span class="badge ${t.trend}">${t.trend === 'UP' ? '↑ 상승' : '↓ 하락'}</span></td>
      <td>$${t.vwap_2w}</td>
      <td>$${t.vwap_prev}</td>
      <td><span class="badge ${t.action}">${t.action === 'BUY' ? '매수' : '매도'}</span></td>
      <td>${t.allocation}%</td>
    </tr>`).join('');

  // 차트 공통 옵션
  const gridColor = '#1e2535';
  const tickColor = '#475569';
  const baseOpts = {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: tickColor, maxTicksLimit: 10, font: { size: 10 } }, grid: { color: gridColor } },
      y: { ticks: { color: tickColor, font: { size: 10 } }, grid: { color: gridColor } },
    },
  };

  // 데이터 thin (500일 → 약 100포인트)
  const step = Math.ceil(daily.length / 120);
  const d = thin(daily, step);
  const labels = d.map(r => r.date);

  // 1. 포트폴리오
  new Chart(document.getElementById('chart-portfolio'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '전략', data: d.map(r => r.strategy), borderColor: '#34d399', borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false },
        { label: 'Buy & Hold', data: d.map(r => r.buyhold), borderColor: '#60a5fa', borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false, borderDash: [4,3] },
      ]
    },
    options: { ...baseOpts,
      plugins: { ...baseOpts.plugins },
      scales: { ...baseOpts.scales, y: { ...baseOpts.scales.y, ticks: { ...baseOpts.scales.y.ticks, callback: v => (v/1e4).toFixed(0)+'만' } } }
    }
  });

  // 2. 가격 + VWAP
  new Chart(document.getElementById('chart-price'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'GLD 가격', data: d.map(r => r.price), borderColor: '#fbbf24', borderWidth: 1.5, pointRadius: 0, tension: 0.2, fill: false },
        { label: '2주 VWAP', data: d.map(r => r.vwap), borderColor: '#a78bfa', borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false, borderDash: [5,3] },
      ]
    },
    options: baseOpts,
  });

  // 3. 비중
  new Chart(document.getElementById('chart-alloc'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '금 비중 (%)', data: d.map(r => r.allocation), borderColor: '#f97316', borderWidth: 2, pointRadius: 0, tension: 0.1, fill: { target: 'origin', above: 'rgba(249,115,22,0.08)' } },
      ]
    },
    options: { ...baseOpts,
      scales: { ...baseOpts.scales, y: { ...baseOpts.scales.y, min: 0, max: 100, ticks: { ...baseOpts.scales.y.ticks, callback: v => v+'%' } } }
    }
  });
});
</script>
</body>
</html>
