<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>추세 강도 모니터</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    header{padding:20px 28px 14px;border-bottom:1px solid #1e2535}
    header h1{font-size:1.2rem;font-weight:700;color:#f8fafc}
    header p{font-size:0.74rem;color:#475569;margin-top:4px}

    .chart-section{padding:20px 28px 0}
    .chart-wrap{background:#161b27;border:1px solid #1e2535;border-radius:14px;padding:18px;margin-bottom:20px}
    .chart-wrap canvas{max-height:340px}

    .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;padding:0 28px 24px}
    .asset-btn{
      background:#161b27;border:1.5px solid #1e2535;border-radius:10px;
      padding:10px 12px;cursor:pointer;transition:all .2s;user-select:none;
      text-align:left;position:relative;overflow:hidden
    }
    .asset-btn.active{border-color:var(--c);background:#1a2030}
    .asset-btn:hover{background:#1a2030}
    .asset-btn .name{font-size:0.82rem;font-weight:700;color:#94a3b8;transition:color .2s}
    .asset-btn.active .name{color:var(--c)}
    .asset-btn .val{font-size:1.25rem;font-weight:800;line-height:1.1;margin-top:5px}
    .asset-btn .indicator{position:absolute;top:0;left:0;right:0;height:2px;background:var(--c);opacity:0;transition:opacity .2s}
    .asset-btn.active .indicator{opacity:1}
  </style>
</head>
<body>

<header>
  <h1>📊 추세 강도 모니터</h1>
  <p>VWAP (Volume Weighted Average Price) · <span id="updated"></span></p>
</header>

<div class="chart-section">
  <div class="chart-wrap"><canvas id="chart-structure"></canvas></div>
</div>

<div class="asset-grid" id="asset-grid"></div>

<script>
const GRID='#1e2535', TICK='#475569';
function round2(v){return Math.round(v*100)/100}

const STRUCT_LABELS = ['200d','190d','180d','170d','160d','150d','140d','130d','120d','110d',
                       '100d','90d','80d','70d','60d','50d','40d','30d','20d','10d'];

let structChart;
let activeSet = new Set(['TLT']);

fetch('trend_data.json').then(r=>r.json()).then(data=>{
  const names = ['TLT','GLD','IBIT','SPY','QQQ','삼성전자','SK하이닉스','리노공업'].filter(n=>data[n]);

  // 헤더 업데이트 시각
  document.getElementById('updated').textContent =
    (data._meta?.updated_at || '') + ' 기준';

  // 10d 정규화값
  function get10d(name){
    const s = data[name].vwap_structure || [];
    return s[0]?.norm ?? null; // s[0] = 10d
  }

  const grid = document.getElementById('asset-grid');

  function renderCards(){
    grid.innerHTML='';
    names.forEach(name=>{
      const color    = data[name].color;
      const isActive = activeSet.has(name);
      const v10      = get10d(name);
      const valColor = v10==null?'#475569': v10>=100?'#34d399':'#f87171';

      const btn = document.createElement('div');
      btn.className='asset-btn'+(isActive?' active':'');
      btn.style.setProperty('--c', color);
      btn.innerHTML=`
        <div class="indicator"></div>
        <div class="name">${name}</div>
        <div class="val" style="color:${isActive?color:valColor}">${v10!=null?v10.toFixed(2):'–'}</div>
      `;
      btn.addEventListener('click',()=>{
        if(activeSet.has(name)) activeSet.delete(name);
        else activeSet.add(name);
        renderCards();
        updateChart();
      });
      grid.appendChild(btn);
    });
  }

  function makeDatasets(){
    return names.map(name=>{
      const isActive = activeSet.has(name);
      const reversed = [...(data[name].vwap_structure||[])].reverse();
      return {
        label: name,
        data:  reversed.map(s=>s.norm),
        borderColor: data[name].color,
        borderWidth: isActive?2:0,
        pointRadius: isActive?3:0,
        pointBackgroundColor: data[name].color,
        tension: 0.3,
        fill: false,
        hidden: !isActive,
      };
    });
  }

  function makeAnnotations(){
    const annotations = {
      base:{type:'line',yMin:100,yMax:100,borderColor:'#475569',borderWidth:1.5},
    };
    const active = names.filter(n=>activeSet.has(n)).map(name=>{
      const s = data[name].vwap_structure||[];
      return {name, val: s[0]?.norm}; // 10d
    }).filter(d=>d.val!=null).sort((a,b)=>b.val-a.val);

    active.forEach(({name,val})=>{
      annotations['lbl_'+name]={
        type:'label', xValue:19, yValue:val,
        content: name+' '+val.toFixed(2),
        color: data[name].color,
        font:{size:10,weight:'bold'},
        backgroundColor:'rgba(15,17,23,0.85)',
        padding:{x:4,y:2},
        position:{x:'start',y:'center'},
        xAdjust:4,
      };
    });
    return annotations;
  }

  function updateChart(){
    structChart.data.datasets.forEach((d,i)=>{
      const ds=makeDatasets();
      d.borderWidth=ds[i].borderWidth;
      d.hidden=ds[i].hidden;
      d.pointRadius=ds[i].pointRadius;
    });
    structChart.options.plugins.annotation.annotations=makeAnnotations();
    structChart.update('none');
  }

  renderCards();

  structChart = new Chart(document.getElementById('chart-structure'),{
    type:'line',
    data:{labels:STRUCT_LABELS, datasets:makeDatasets()},
    options:{
      responsive:true, maintainAspectRatio:true,
      animation:{duration:300},
      interaction:{mode:'index',intersect:false},
      layout:{padding:{right:90}},
      plugins:{
        legend:{display:false},
        annotation:{annotations:makeAnnotations()},
        tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2)}`}}
      },
      scales:{
        x:{ticks:{color:TICK,font:{size:10}},grid:{color:GRID}},
        y:{
          ticks:{
            color:TICK,
            font:{size:10},
            count:10,
            callback:v=>v.toFixed(2)
          },
          grid:{color:GRID},
          afterDataLimits(scale){
            if(activeSet.size===0){
              scale.min=100; scale.max=200;
            }
          }
        },
      }
    }
  });
});
</script>
</body>
</html>
