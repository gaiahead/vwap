<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VWAP 추세 모니터</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <link rel="stylesheet" href="style.css?v=data-20260701-0700"/>
</head>
<body>

<header>
  <h1>📊 VWAP 추세 모니터</h1>
  <p>Volume Weighted Average Price · <span id="updated"></span></p>
</header>

<div class="section-box momentum-monitor" id="momentum-section" style="display:none">
  <div class="panel-title">📐 VWAP 5 / 20 / 200 MONITOR</div>
  <div class="momentum-monitor-sub">5/20과 5/200은 각각 단기·장기 VWAP 대비 괴리율입니다. 행 클릭 시 종목 상세 차트가 열립니다.</div>
  <div class="momentum-table-wrap"><table class="momentum-table">
    <thead>
      <tr>
        <th data-sort="name">종목</th>
        <th data-sort="vwap_5_20_return_pct">5/20 괴리율</th>
        <th data-sort="vwap_5_200_return_pct">5/200 괴리율</th>
        <th data-sort="buy_hold_return_pct">200일 수익률</th>
        <th data-sort="buy_hold_mdd_pct">200일 MDD</th>
      </tr>
    </thead>
    <tbody id="momentum-body"></tbody>
  </table></div>
</div>

<div class="detail-section" id="detail-section" style="display:none">
  <div class="detail-header">
    <div class="detail-title-wrap">
      <h2 id="detail-title">Loading...</h2>
      <div class="detail-symbol" id="detail-symbol"></div>
    </div>
    <button class="close-btn" id="detail-close">✕</button>
  </div>
  <div id="detail-content"></div>
</div>

<script src="app.js?v=data-20260701-0700"></script>
</body>
</html>
