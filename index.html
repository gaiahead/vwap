<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>추세 강도 모니터</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    header{padding:24px 28px 14px;border-bottom:1px solid #1e2535}
    header h1{font-size:1.2rem;font-weight:700;color:#f8fafc}
    header p{font-size:0.74rem;color:#475569;margin-top:4px}

    .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:20px 28px}
    .asset-btn{
      background:#161b27;border:1.5px solid #1e2535;border-radius:12px;
      padding:14px 16px;cursor:pointer;transition:all .2s;user-select:none;
      text-align:left;position:relative;overflow:hidden
    }
    .asset-btn.active{border-color:var(--c);background:#1a2030}
    .asset-btn:hover{background:#1a2030}
    .asset-btn .name{font-size:0.95rem;font-weight:700;color:#94a3b8;transition:color .2s}
    .asset-btn.active .name{color:var(--c)}
    .asset-btn .score{font-size:1.6rem;font-weight:800;line-height:1.1;margin-top:6px}
    .asset-btn .ret{font-size:0.72rem;color:#475569;margin-top:5px}
    .asset-btn .gauge{margin-top:10px;height:4px;background:#1e2535;border-radius:2px;overflow:hidden}
    .asset-btn .gauge-fill{height:100%;border-radius:2px;transition:width .3s}
    .asset-btn .indicator{position:absolute;top:0;left:0;right:0;height:2px;background:var(--c);opacity:0;transition:opacity .2s}
    .asset-btn.active .indicator{opacity:1}

    .section{padding:0 28px 24px}
    .section h2{font-size:0.72rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
    .chart-wrap{background:#161b27;border:1px solid #1e2535;border-radius:14px;padding:18px;margin-bottom:18px}
    .chart-wrap canvas{max-height:300px}

    footer{padding:16px 28px;border-top:1px solid #1e2535;font-size:0.68rem;color:#374151}
  </style>
</head>
<body>

<header>
  <h1>📊 추세 강도 모니터</h1>
  <p>20일 롤링 Volume Profile VWAP · 1년 백분위 정규화 (-100 ~ +100) · <span id="updated"></span></p>
</header>

<div class="asset-grid" id="asset-grid"></div>

<div class="section">
  <h2>추세 강도 추이</h2>
  <div class="chart-wrap"><canvas id="chart-score"></canvas></div>
</div>

<div class="section">
  <h2>가격 추이 (2025-01-10 = 100)</h2>
  <div class="chart-wrap"><canvas id="chart-price"></canvas></div>
</div>

<footer>
  데이터: Yahoo Finance · 주 1회 업데이트 · 과거 성과는 미래를 보장하지 않습니다.
</footer>

<script>
const GRID='#1e2535', TICK='#475569';

function scoreColor(s){
  if(s==null)return'#475569';
  if(s>=70)return'#34d399';
  if(s>=30)return'#86efac';
  if(s>-30)return'#94a3b8';
  if(s>-70)return'#fca5a5';
  return'#f87171';
}
function gaugeW(s){return s==null?50:Math.round((s+100)/2)}
function round2(v){return Math.round(v*100)/100}

let scoreChart, priceChart;
let activeSet = new Set(['TLT']);

fetch('trend_data.json').then(r=>r.json()).then(data=>{
  const names = ['TLT','GLD','IBIT','SPY','QQQ','삼성전자','SK하이닉스','리노공업'].filter(n=>data[n]);
  const labels = data[names[0]].records.map(r=>r.date);

  document.getElementById('updated').textContent =
    (data[names[0]].records.slice(-1)[0]?.date||'')+' 기준';

  // 각 자산 현재 수익률 계산 (첫 price 기준)
  function calcReturn(name){
    const recs = data[name].records;
    const base = recs.find(r=>r.price)?.price||1;
    const last = recs.slice(-1)[0]?.price||base;
    return round2((last/base-1)*100);
  }

  const grid = document.getElementById('asset-grid');

  function renderCards(){
    grid.innerHTML='';
    names.forEach(name=>{
      const asset  = data[name];
      const rec    = asset.records.slice(-1)[0]||{};
      const score  = rec.score;
      const ret    = calcReturn(name);
      const color  = asset.color;
      const isActive = activeSet.has(name);
      const gw     = gaugeW(score);
      const retColor = ret >= 0 ? '#34d399' : '#f87171';
      const retStr = (ret >= 0 ? '+' : '') + ret + '%';

      const btn = document.createElement('div');
      btn.className='asset-btn'+(isActive?' active':'');
      btn.style.setProperty('--c', color);
      btn.innerHTML=`
        <div class="indicator"></div>
        <div class="name">${name}</div>
        <div class="score" style="color:${isActive?color:scoreColor(score)}">${score!=null?(score>0?'+':'')+score:'–'}</div>
        <div class="ret" style="color:${retColor}">${retStr}</div>
        <div class="gauge"><div class="gauge-fill" style="width:${gw}%;background:${color}"></div></div>
      `;
      btn.addEventListener('click',()=>{
        if(activeSet.has(name)) activeSet.delete(name);
        else activeSet.add(name);
        renderCards();
        updateCharts();
      });
      grid.appendChild(btn);
    });
  }

  function makeDatasets(type){
    return names.map(name=>{
      const asset  = data[name];
      const recs   = asset.records;
      const isActive = activeSet.has(name);
      let vals;
      if(type==='score'){
        vals = recs.map(r=>r.score);
      } else {
        const base = recs.find(r=>r.price)?.price||1;
        vals = recs.map(r=>r.price?round2(r.price/base*100):null);
      }
      return {
        label: name, data: vals,
        borderColor: asset.color,
        borderWidth: isActive?2:0,
        pointRadius: 0, tension: 0.3, fill: false,
        hidden: !isActive,
      };
    });
  }

  const lastIdx = labels.length - 1;

  // 가격 차트용 라인 끝 annotation 생성
  function makePriceAnnotations(){
    const annotations = {
      base:{type:'line',yMin:100,yMax:100,borderColor:'#475569',borderWidth:1.5},
    };
    // 활성 자산 정렬: y값 기준 내림차순 (라벨 겹침 방지)
    const active = names.filter(n=>activeSet.has(n)).map(name=>{
      const recs = data[name].records;
      const base = recs.find(r=>r.price)?.price||1;
      const last = recs.slice(-1)[0];
      const val  = last?.price ? round2(last.price/base*100) : null;
      return {name, val};
    }).filter(d=>d.val!=null).sort((a,b)=>b.val-a.val);

    active.forEach(({name, val})=>{
      const ret = round2(val-100);
      annotations['lbl_'+name] = {
        type:'label',
        xValue: lastIdx,
        yValue: val,
        content: name+' '+(ret>=0?'+':'')+ret+'%',
        color: data[name].color,
        font:{size:10, weight:'bold'},
        backgroundColor:'rgba(15,17,23,0.85)',
        padding:{x:4,y:2},
        position:{x:'start', y:'center'},
        xAdjust: 4,
      };
    });
    return annotations;
  }

  // 추세 강도 차트용 라인 끝 annotation
  function makeScoreAnnotations(){
    const annotations = {
      zero:{type:'line',yMin:0,yMax:0,borderColor:'#475569',borderWidth:1.5},
    };
    const active = names.filter(n=>activeSet.has(n)).map(name=>{
      const recs = data[name].records;
      const val  = recs.slice(-1)[0]?.score;
      return {name, val};
    }).filter(d=>d.val!=null).sort((a,b)=>b.val-a.val);

    active.forEach(({name, val})=>{
      annotations['lbl_'+name] = {
        type:'label',
        xValue: lastIdx,
        yValue: val,
        content: name+' '+(val>=0?'+':'')+val,
        color: data[name].color,
        font:{size:10, weight:'bold'},
        backgroundColor:'rgba(15,17,23,0.85)',
        padding:{x:4,y:2},
        position:{x:'start', y:'center'},
        xAdjust: 4,
      };
    });
    return annotations;
  }

  function updateCharts(){
    const scoreDS = makeDatasets('score');
    const priceDS = makeDatasets('price');
    scoreChart.data.datasets.forEach((d,i)=>{ d.borderWidth=scoreDS[i].borderWidth; d.hidden=scoreDS[i].hidden; });
    priceChart.data.datasets.forEach((d,i)=>{ d.borderWidth=priceDS[i].borderWidth; d.hidden=priceDS[i].hidden; });
    scoreChart.options.plugins.annotation.annotations = makeScoreAnnotations();
    priceChart.options.plugins.annotation.annotations = makePriceAnnotations();
    scoreChart.update('none');
    priceChart.update('none');
  }

  renderCards();

  // ── 추세 강도 차트 ──
  scoreChart = new Chart(document.getElementById('chart-score'),{
    type:'line',
    data:{labels, datasets: makeDatasets('score')},
    options:{
      responsive:true, maintainAspectRatio:true,
      animation:{duration:300},
      interaction:{mode:'index',intersect:false},
      layout:{padding:{right:70}},
      plugins:{
        legend:{display:false},
        annotation:{annotations: makeScoreAnnotations()}
      },
      scales:{
        x:{ticks:{color:TICK,maxTicksLimit:10,font:{size:10}},grid:{color:GRID}},
        y:{min:-100,max:100,ticks:{color:TICK,font:{size:10},callback:v=>v>0?'+'+v:v},grid:{color:GRID}},
      }
    }
  });

  // ── 가격 차트 ──
  priceChart = new Chart(document.getElementById('chart-price'),{
    type:'line',
    data:{labels, datasets: makeDatasets('price')},
    options:{
      responsive:true, maintainAspectRatio:true,
      animation:{duration:300},
      interaction:{mode:'index',intersect:false},
      layout:{padding:{right:70}},
      plugins:{
        legend:{display:false},
        annotation:{annotations: makePriceAnnotations()}
      },
      scales:{
        x:{ticks:{color:TICK,maxTicksLimit:10,font:{size:10}},grid:{color:GRID}},
        y:{min:50,max:200,ticks:{color:TICK,font:{size:10},callback:v=>v.toFixed(0)},grid:{color:GRID},
           afterDataLimits(scale){
             if(activeSet.size===0){scale.min=100;scale.max=200;return;}
             const pad=10;
             scale.min=Math.floor(scale.min-pad);
             scale.max=Math.ceil(scale.max+pad);
           }
        },
      }
    }
  });
});
</script>
</body>
</html>
